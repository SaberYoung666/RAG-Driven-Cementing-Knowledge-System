# 应用主配置文件，定义数据路径、模型参数与服务运行参数。
ingestion: # 文档摄取与切分配置
  input_dir: data/raw_docs # 原始文档输入目录（支持 pdf/docx/txt/md）
  output_path: data/chunks.jsonl # 切分后 chunk 输出文件路径（JSONL）
  strategy: structure_then_window # 切分策略：先按章节再滑窗（structure_then_window）
  max_section_chars: 3000 # 单章节最大字符数，超过后会继续按滑窗切分
  chunk_chars: 1200 # 每个 chunk 的目标字符数
  chunk_overlap: 200 # 相邻 chunk 的重叠字符数
  min_chunk_chars: 200 # 保留 chunk 的最小字符数阈值
  remove_empty_lines: true # 清洗文本时是否移除空行
  remove_repeated_margins: true # 是否过滤重复页眉页脚（简单规则）
  job_store_path: data/ingest_jobs.json # 异步入库状态持久化文件

ocr: # OCR 预处理配置
  lang: ch # PaddleOCR 语言模型
  use_angle_cls: false # 文本方向分类；文档基本都是正向时可关掉提速
  enable_mkldnn: false # Windows/CPU 下遇到 oneDNN(PIR) 报错时关闭 MKL-DNN
  cpu_threads: 8 # OCR CPU 线程数，可按机器核心数调整
  prewarm: true # 服务启动时预热 OCR 子进程，避免首个请求冷启动
  init_kwargs: # 透传给 PaddleOCR 的初始化参数，用于切轻量模型或限制输入尺寸
    use_textline_orientation: false
    use_doc_orientation_classify: false
    use_doc_unwarping: false
    text_det_limit_side_len: 736
    text_det_limit_type: min
    text_detection_model_name: PP-OCRv5_mobile_det
    text_recognition_model_name: PP-OCRv5_mobile_rec
  min_text_chars: 20 # auto 模式下低于该字符数触发 OCR
  strict: false # OCR 页失败是否中断整个文档
  timeout_seconds: 60 # 单页 OCR 超时阈值；已配合子进程隔离，超时后可安全重启
  pdf_render_scale: 1.0 # PDF 渲染倍数，越高越清晰但越慢
  output_dir: data/ocr_texts # 实际发生 OCR 的文档文本输出目录

indexing: # 索引构建配置
  chunks_path: data/chunks.jsonl # 用于建索引的 chunk 文件路径
  index_dir: data/index # 索引产物目录（FAISS/BM25/元数据）
  embedding_model: sentence-transformers/all-MiniLM-L6-v2 # 向量化模型名称
  normalize_embeddings: true # 向量是否归一化（通常配合内积检索）
  batch_size: 16 # 向量编码批大小（显存不足可调小）

retrieval: # 检索默认参数
  default_top_k: 6 # 最终返回给上层的候选条数
  default_candidate_k: 20 # 召回阶段候选数（供重排或截断）
  hybrid:
    alpha: 0.5 # 混合检索权重：越大越偏向向量检索，越小越偏向 BM25

rerank: # 重排模型配置
  enabled: true # 是否启用 cross-encoder 重排
  model: cross-encoder/ms-marco-MiniLM-L-6-v2 # 重排模型名称

llm: # 生成模型配置（用于问答生成）
  enabled: true # 是否启用 LLM 生成回答
  provider: openai_compatible # 提供方类型（当前为 OpenAI 兼容接口）
  base_url: https://api.deepseek.com/v1 # OpenAI 兼容 API 基础地址
  api_key: "sk-45e904aa69604bd3b6ae7a08c7783b75" # API Key（也可通过环境变量注入）
  model: deepseek-chat # 生成使用的模型名
  temperature: 0.2 # 采样温度，越低越稳定
  max_tokens: 2000 # 单次生成最大输出 token 数

debug:
  expose_error_details: false # 是否在文档处理状态接口中返回完整 traceback

