services:
  postgres:
    image: postgres:16-alpine
    container_name: cement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cement-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/schema_init_full.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rag-service:
    build:
      context: ./rag-service
    container_name: cement-rag-service
    cpus: 4.0
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    environment:
      BACKEND_CALLBACK_BASE_URL: http://backend:8080
      BACKEND_CALLBACK_SECRET: ${RAG_STATUS_CALLBACK_SECRET:-change-me-rag-callback}
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-30}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-300}
      OMP_NUM_THREADS: 2
      MKL_NUM_THREADS: 2
      OPENBLAS_NUM_THREADS: 2
      NUMEXPR_NUM_THREADS: 2
      NO_PROXY: localhost,127.0.0.1,backend,postgres,rag-service
    ports:
      - "${RAG_PORT:-8000}:8000"
    volumes:
      - shared_docs:/data/uploads/docs
      - rag_data:/app/data
      - hf_cache:/root/.cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/rag/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
    container_name: cement-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cement-knowledge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      RAG_BASE_URL: http://rag-service:8000
      DOCS_STORAGE_DIR: /data/uploads/docs
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-change-me-please-use-env}
      RAG_STATUS_CALLBACK_SECRET: ${RAG_STATUS_CALLBACK_SECRET:-change-me-rag-callback}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - shared_docs:/data/uploads/docs

  frontend:
    build:
      context: ./frontend
    container_name: cement-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  shared_docs:
  rag_data:
  hf_cache:
